[remote.github]
owner = "Bisa"
repo = "DeathCorpses"

[changelog]
header = ""
body = """
{%- for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- [`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/Bisa/DeathCorpses/commit/{{ commit.id }}) **{{ commit.message | split(pat="\n") | first | trim }}**
{%- if commit.body %}

{{ commit.body | replace(from="\n\n", to="\n.\n") | indent(prefix="  > ", first=true) | replace(from="  > .", to="  >") }}

{%- endif %}

{% endfor -%}
{%- if group is containing("Features") %}
---
{% endif -%}
{% endfor -%}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat",     group = "<!-- 0 -->Features" },
  { message = "^revert",   group = "<!-- 1 -->Reverted" },
  { message = "^fix",      group = "<!-- 2 -->Bug Fixes" },
  { message = "^perf",     group = "<!-- 3 -->Performance" },
  { message = "^refactor", group = "<!-- 4 -->Refactor" },
  { message = "^build",    group = "<!-- 5 -->Build" },
  { message = "^docs",     group = "<!-- 6 -->Documentation" },
  { message = "^ci",       group = "<!-- 7 -->CI" },
  { message = "^test",     group = "<!-- 8 -->Testing" },
  { message = "^style",    group = "<!-- 9 -->Styling" },
  { message = "^chore",    group = "<!-- 10 -->Miscellaneous" },
]
filter_commits = false
tag_pattern = "[0-9]*"
