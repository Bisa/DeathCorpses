name: Prerelease

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or commit to build from'
        default: 'main'
        required: false

jobs:
  prerelease:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Read mod and target info
        id: info
        run: |
          MODID=$(jq -r .modid modinfo.json)
          BASE_VERSION=$(jq -r .version modinfo.json)
          HASH=$(git rev-parse --short HEAD)
          VERSION="${BASE_VERSION}-rc.${HASH}"

          VS_NET10=$(jq -r .net10.gameVersion targets.json)
          VS_NET8=$(jq -r .net8.gameVersion targets.json)

          echo "modid=$MODID" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "vs_net10=$VS_NET10" >> $GITHUB_OUTPUT
          echo "vs_net8=$VS_NET8" >> $GITHUB_OUTPUT

      - name: Build mod zips
        run: |
          MODID=${{ steps.info.outputs.modid }}
          VERSION=${{ steps.info.outputs.version }}
          VS_NET10=${{ steps.info.outputs.vs_net10 }}
          VS_NET8=${{ steps.info.outputs.vs_net8 }}

          nix build .#zip-net10
          cp result "${MODID}-vs${VS_NET10}_${VERSION}.zip"

          nix build .#zip-net8
          cp result "${MODID}-vs${VS_NET8}_${VERSION}.zip"

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MODID=${{ steps.info.outputs.modid }}
          VERSION=${{ steps.info.outputs.version }}
          VS_NET10=${{ steps.info.outputs.vs_net10 }}
          VS_NET8=${{ steps.info.outputs.vs_net8 }}

          gh release create "${VERSION}" \
            --draft \
            --prerelease \
            --title "${VERSION}" \
            --generate-notes \
            "${MODID}-vs${VS_NET10}_${VERSION}.zip" \
            "${MODID}-vs${VS_NET8}_${VERSION}.zip"
          gh release edit "${VERSION}" --draft=false
