name: DCO Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  dco:
    name: Verify DCO Sign-Off
    runs-on: ubuntu-latest
    steps:
      - name: Check out commits
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Signed-off-by on all PR commits
        if: github.event.pull_request.user.login != github.repository_owner
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          failed=0

          for sha in $(git rev-list --no-merges "$base".."$head"); do
            message=$(git log -1 --format='%B' "$sha")
            if ! echo "$message" | grep -qP '^Signed-off-by: .+ <.+>'; then
              echo "::error::Commit $sha is missing a valid 'Signed-off-by' line."
              echo "  Subject: $(git log -1 --format='%s' "$sha")"
              echo "  Author:  $(git log -1 --format='%an <%ae>' "$sha")"
              echo ""
              failed=1
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "All commits must include a DCO sign-off."
            echo "Add one with: git commit -s --amend"
            echo "See CONTRIBUTING.md for details."
            exit 1
          fi

          echo "All commits have valid DCO sign-off."
